<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: #1e1b4b; }
    h2 { font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
    .row { margin-bottom: 14px; }
    label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; color: #6b7280; margin-bottom: 5px; }
    input, select { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px;
                    font-size: 12px; color: #111; }
    input:focus, select:focus { outline: 2px solid #7c3aed; border-color: transparent; }
    .checks { display: flex; flex-direction: column; gap: 6px; }
    .check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #374151;
             text-transform: none; letter-spacing: 0; font-weight: 400; margin-bottom: 0; cursor: pointer; }
    .check input { width: auto; accent-color: #7c3aed; }
    .history-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f3f4f6; }
    .history-section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase;
                          letter-spacing: 0.05em; color: #6b7280; margin-bottom: 8px; }
    .history-list { max-height: 150px; overflow-y: auto; }
    .history-item { display: block; padding: 5px 0; border-bottom: 1px solid #f3f4f6;
                    text-decoration: none; color: #1e1b4b; font-size: 11px; line-height: 1.4; }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { color: #7c3aed; }
    .history-item .date { color: #9ca3af; font-size: 10px; margin-left: 4px; }
    .history-empty { color: #9ca3af; font-size: 11px; }
  </style>
</head>
<body>
  <h2><span>📎</span> Bili Clipper <span id="save-hint" style="font-size:10px;color:#16a34a;font-weight:400;opacity:0;transition:opacity 0.3s;margin-left:4px;">✓ 已保存</span></h2>

  <div id="obsidian-settings">
    <div class="row">
      <label>Vault 名称</label>
      <input type="text" id="vault_name" placeholder="Obsidian Vault">
    </div>

    <div class="row">
      <label>目标文件夹</label>
      <input type="text" id="folder" placeholder="Raw">
    </div>
  </div>

  <div class="row">
    <label>写入目标（可多选）</label>
    <div class="checks" id="dest-checks">
      <label class="check"><input type="checkbox" value="obsidian"> Obsidian</label>
      <label class="check"><input type="checkbox" value="notion"> Notion</label>
      <label class="check"><input type="checkbox" value="clipboard"> 剪贴板</label>
    </div>
  </div>

  <div id="notion-settings" style="display:none;">
    <div class="row">
      <label>Notion Token</label>
      <div style="display:flex;gap:6px;">
        <input type="password" id="notion_token" placeholder="ntn_ 开头" style="flex:1;">
        <button id="notion-connect" style="padding:6px 10px;background:#7c3aed;color:white;
          border:none;border-radius:6px;font-size:11px;cursor:pointer;flex-shrink:0;">连接</button>
      </div>
      <p id="notion-status" style="font-size:10px;color:#9ca3af;margin-top:4px;"></p>
    </div>
    <div class="row" id="notion-db-row" style="display:none;">
      <label>保存到哪个 database</label>
      <select id="notion_database_select"></select>
    </div>
    <details style="margin-bottom:14px;">
      <summary style="font-size:10px;color:#9ca3af;cursor:pointer;">高级：手动粘贴 database 链接</summary>
      <input type="text" id="notion_database" placeholder="https://notion.so/xxxx…" style="margin-top:6px;">
      <p id="notion-db-hint" style="font-size:10px;color:#9ca3af;margin-top:4px;"></p>
    </details>
  </div>

  <div class="history-section">
    <h3>最近 Clip</h3>
    <div class="history-list" id="history-list"></div>
  </div>

  <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f3f4f6;text-align:center;">
    <a id="open-welcome" href="#" style="font-size:11px;color:#7c3aed;text-decoration:none;">⚙ 查看设置指南</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
